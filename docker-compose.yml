services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resellid
      POSTGRES_PASSWORD: resellid
      POSTGRES_DB: resellid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resellid"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build: services/api-gateway
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # compose hostnames override the k8s service names in .env
      REDIS_HOST: redis
      DATABASE_URL: postgresql://resellid:resellid@postgres:5432/resellid
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  pricing-worker:
    build: services/pricing-worker
    env_file: .env
    environment:
      REDIS_HOST: redis
      DATABASE_URL: postgresql://resellid:resellid@postgres:5432/resellid
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 3

  frontend:
    build:
      context: services/frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    environment:
      VITE_PROXY_TARGET: http://api-gateway:8000
    depends_on:
      - api-gateway

volumes:
  pgdata:
